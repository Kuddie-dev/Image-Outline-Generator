<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outline Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        canvas { max-width: 100%; height: auto; border: 1px solid #e5e7eb; border-radius: 0.5rem; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-6 flex flex-col items-center">

    <div class="max-w-4xl w-full bg-white rounded-xl shadow-lg p-8">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">Outline Generator</h1>
        <p class="text-center text-gray-500 mb-8">Change the image to a black and white outline</p>

        <!-- Controls -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 bg-gray-50 p-6 rounded-lg border border-gray-200">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">1. Upload your image</label>
                <input type="file" id="imageUpload" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    2. Adjust Line Sensitivity: <span id="thresholdValue" class="font-bold text-blue-600">50</span>
                </label>
                <input type="range" id="thresholdSlider" min="10" max="150" value="50" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                <p class="text-xs text-gray-500 mt-2">Swipe left for more lines, to the right for cleaner/less lines.</p>
            </div>
        </div>

        <!-- Canvas Area -->
        <div class="flex flex-col items-center justify-center space-y-4">
            <div id="loading" class="hidden text-blue-600 font-semibold animate-pulse">Processing...</div>
            <canvas id="outputCanvas" class="hidden shadow-md"></canvas>
            
            <button id="downloadBtn" class="hidden mt-4 bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg shadow transition duration-200">
                Download image
            </button>
        </div>
    </div>

    <script>
        const imageUpload = document.getElementById('imageUpload');
        const thresholdSlider = document.getElementById('thresholdSlider');
        const thresholdValueDisplay = document.getElementById('thresholdValue');
        const outputCanvas = document.getElementById('outputCanvas');
        const ctx = outputCanvas.getContext('2d', { willReadFrequently: true });
        const downloadBtn = document.getElementById('downloadBtn');
        const loading = document.getElementById('loading');

        let originalImage = new Image();
        let isImageLoaded = false;

        // Handle Image Upload
        imageUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                originalImage.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // When image is loaded
        originalImage.onload = function() {
            isImageLoaded = true;
            processImage();
        };

        // Handle Slider Change
        thresholdSlider.addEventListener('input', function() {
            thresholdValueDisplay.textContent = this.value;
            if (isImageLoaded) {
                // Debounce slighty to prevent lag
                clearTimeout(window.processTimeout);
                window.processTimeout = setTimeout(processImage, 100);
            }
        });

        // Core Edge Detection Function (Sobel Operator)
        function processImage() {
            loading.classList.remove('hidden');
            outputCanvas.classList.add('hidden');
            downloadBtn.classList.add('hidden');

            // Set canvas dimensions
            outputCanvas.width = originalImage.width;
            outputCanvas.height = originalImage.height;

            // Draw original image to canvas to get pixel data
            ctx.drawImage(originalImage, 0, 0);
            const imageData = ctx.getImageData(0, 0, outputCanvas.width, outputCanvas.height);
            const data = imageData.data;
            const width = imageData.width;
            const height = imageData.height;

            // Create new image data for output
            const outputImageData = ctx.createImageData(width, height);
            const outData = outputImageData.data;
            
            const threshold = parseInt(thresholdSlider.value);

            // Convert to grayscale first for easier edge detection
            const grayscale = new Uint8ClampedArray(width * height);
            for (let i = 0; i < data.length; i += 4) {
                // Standard luminosity formula
                grayscale[i / 4] = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
            }

            // Sobel kernels
            const kernelX = [-1, 0, 1, -2, 0, 2, -1, 0, 1];
            const kernelY = [-1, -2, -1, 0, 0, 0, 1, 2, 1];

            // Apply Sobel operator
            for (let y = 1; y < height - 1; y++) {
                for (let x = 1; x < width - 1; x++) {
                    let pixelX = 0;
                    let pixelY = 0;

                    // 3x3 convolution
                    for (let cy = -1; cy <= 1; cy++) {
                        for (let cx = -1; cx <= 1; cx++) {
                            const pixelIndex = ((y + cy) * width + (x + cx));
                            const weightX = kernelX[(cy + 1) * 3 + (cx + 1)];
                            const weightY = kernelY[(cy + 1) * 3 + (cx + 1)];
                            
                            pixelX += grayscale[pixelIndex] * weightX;
                            pixelY += grayscale[pixelIndex] * weightY;
                        }
                    }

                    const magnitude = Math.sqrt(pixelX * pixelX + pixelY * pixelY);
                    const index = (y * width + x) * 4;

                    // Thresholding: If edge detected, make it black, else white
                    if (magnitude > threshold) {
                        outData[index] = 0;     // R
                        outData[index + 1] = 0; // G
                        outData[index + 2] = 0; // B
                        outData[index + 3] = 255; // Alpha
                    } else {
                        outData[index] = 255;   // R
                        outData[index + 1] = 255; // G
                        outData[index + 2] = 255; // B
                        outData[index + 3] = 255; // Alpha
                    }
                }
            }

            // Deal with borders (top, bottom, left, right edges of image)
            // Just making them white to avoid artifacting
            for (let i = 0; i < outData.length; i += 4) {
                if (outData[i+3] === 0) { // If alpha is 0 (unprocessed edges)
                    outData[i] = 255; outData[i+1] = 255; outData[i+2] = 255; outData[i+3] = 255;
                }
            }

            // Put processed image data back to canvas
            ctx.putImageData(outputImageData, 0, 0);

            // Update UI
            loading.classList.add('hidden');
            outputCanvas.classList.remove('hidden');
            downloadBtn.classList.remove('hidden');
        }

        // Handle Download
        downloadBtn.addEventListener('click', function() {
            const link = document.createElement('a');
            link.download = 'Peta_Outline_HitamPutih.png';
            link.href = outputCanvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
